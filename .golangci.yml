# golangci-lint v2 설정
# 방침: 최대한 꼼꼼하게 — 노이즈가 확인된 규칙만 선별적으로 비활성화한다.
version: "2"

linters:
  default: none

  enable:
    # ── 필수 린터 ──
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # ── 에러 처리 ──
    - errorlint    # errors.Is/As 올바른 사용
    - nilerr       # if err != nil { return nil } 감지
    - nilnesserr   # err != nil 후 다른 nil 에러 반환 감지
    - nilnil       # return nil, nil 감지
    - errname      # ErrFoo / FooError 네이밍 강제
    - err113       # 센티넬 에러 사용 강제
    - wrapcheck    # 외부 패키지 에러 래핑 강제

    # ── Uber 스타일 ──
    - gochecknoinits   # init() 금지
    - gochecknoglobals # 전역 변수 금지
    - nestif           # if 중첩 깊이 제한
    - noctx            # HTTP 요청 시 context 전달 강제
    - contextcheck     # context 전파 누락 검출
    - ireturn          # "accept interfaces, return structs" 강제
    - depguard         # 특정 패키지 import 금지
    - nonamedreturns   # named return 금지

    # ── 스타일/품질 ──
    - revive
    - gocritic
    - goconst
    - unconvert
    - misspell
    - whitespace
    - dupword
    - modernize    # Go 최신 기능 사용 권장
    - tagalign     # 구조체 태그 정렬
    - unparam      # 미사용 파라미터 검출

    # ── 버그 방지 ──
    - durationcheck    # time.Duration 연산 실수
    - forcetypeassert  # 안전하지 않은 타입 단언
    - exhaustive       # switch enum 모든 case 처리
    - nakedret         # 큰 함수에서 naked return 금지
    - containedctx     # struct에 context 저장 금지
    - asasalint        # []any → ...any 전달 실수
    - reassign         # 전역 변수 재할당 감지
    - wastedassign     # 미사용 할당 감지

    # ── 복잡도/길이 ──
    - gocognit  # 인지 복잡도 제한
    - funlen    # 함수 길이 제한
    - lll       # 줄 길이 제한
    - dupl      # 중복 코드 검출

    # ── 매직 넘버/변수명 ──
    - mnd         # 매직 넘버 금지
    - varnamelen  # 변수명 길이 vs 스코프

    # ── 성능 ──
    - perfsprint    # fmt.Sprintf → strconv 등 대안 제안
    - prealloc      # 슬라이스 사전 할당
    - usestdlibvars # http.StatusOK 등 표준 상수 사용

    # ── 보안 ──
    - gosec

    # ── 리소스 관리 ──
    - bodyclose      # HTTP Body Close 누락
    - sqlclosecheck  # DB Rows/Stmt Close 누락

    # ── 테스트 품질 ──
    - testifylint   # testify 올바른 사용
    - thelper       # t.Helper() 호출 강제
    - paralleltest  # t.Parallel() 권장

    # ── nolint 규율 ──
    - nolintlint  # //nolint 사용 시 린터명+이유 명시

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

    govet:
      enable-all: true

    staticcheck:
      checks:
        - all
        - -ST1000  # 패키지 주석 형식 (한국어 주석 사용)
        - -ST1020
        - -ST1021
        - -ST1022

    errcheck:
      check-type-assertions: true
      check-blank: true

    goconst:
      min-occurrences: 3

    nakedret:
      max-func-lines: 5

    nolintlint:
      require-specific: true

    exhaustive:
      default-signifies-exhaustive: true

    perfsprint:
      err-error: false

    nestif:
      min-complexity: 5

    gocognit:
      min-complexity: 30

    funlen:
      lines: 100
      statements: 60

    lll:
      line-length: 150
      tab-width: 4

    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "10"
        - "100"
      ignored-functions:
        - "^make$"
        - "^cap$"
        - "^len$"
        - "strconv\\."
        - "time\\."

    dupl:
      threshold: 150

    ireturn:
      allow:
        - error
        - stdlib
        - anon
        - generic
        - "go\\.uber\\.org/fx"
        - "github\\.com/danielgtaylor/huma"
        - "github\\.com/gofiber/fiber"

    depguard:
      rules:
        main:
          deny:
            - pkg: "log"
              desc: "log 패키지 대신 go.uber.org/zap을 사용한다"

    wrapcheck:
      ignore-package-globs:
        - "go-monorepo/*"
        - "github.com/gofiber/fiber/*"
      ignore-interface-regexps:
        - "Ctx"

    varnamelen:
      max-distance: 6
      min-name-length: 2
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-decls:
        - i int
        - j int
        - n int
        - w http.ResponseWriter
        - r *http.Request
        - c fiber.Ctx
        - t testing.T
        - b testing.B
        - db *sql.DB
        - tx *sql.Tx
        - wg sync.WaitGroup
        - mu sync.Mutex
        - ok bool
        - err error
        - ctx context.Context
        - ln net.Listener
        - lc fx.Lifecycle
        - fs embed.FS

  exclusions:
    presets:
      - common-false-positives
      - std-error-handling

    rules:
      # 센티넬 에러(ErrXxx)는 Go 관례상 글로벌 변수로 정의
      - linters:
          - gochecknoglobals
        text: "`Err[A-Z]"

      # DDD 레이어(svc, repo) 생성자는 인터페이스 반환이 정상
      - linters:
          - ireturn
        path: "internal/domain/"

      # cmd/ 패키지에서는 에러 래핑 불필요
      - linters:
          - wrapcheck
        path: "cmd/"

      # go:embed 디렉티브는 줄 길이 제한 제외
      - linters:
          - lll
        source: "^//go:"

      # 테스트 함수는 길이 제한 완화 (table-driven test)
      - linters:
          - funlen
        path: "_test\\.go$"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - gci

  settings:
    gofumpt:
      module-path: go-monorepo

    gci:
      # import 정렬: 표준 라이브러리 → 외부 패키지 → 내부 패키지
      sections:
        - standard
        - default
        - prefix(go-monorepo)
