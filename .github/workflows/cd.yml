name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: >-
          make docker-build
          PLATFORM=linux/amd64
          CACHE_FROM=type=gha
          CACHE_TO=type=gha,mode=max
        env:
          NO_MISE: 1
